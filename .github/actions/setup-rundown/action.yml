name: Setup Rundown
description: Install dependencies and build rundown from source, making implementation/dist/cli.js available for the current job.

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: npm
        cache-dependency-path: implementation/package-lock.json

    - name: Install dependencies
      run: npm ci
      shell: bash
      working-directory: implementation

    - name: Build rundown
      run: npm run build
      shell: bash
      working-directory: implementation
